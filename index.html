<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本旅遊 - 信用卡回饋計算機</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .card-result { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #fafafa; }
        .card-title { font-size: 1.3em; font-weight: bold; color: #34495e; margin-bottom: 12px; border-bottom: 2px solid #3498db; padding-bottom: 8px; display: inline-block; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.05em; }
        .info-label { color: #7f8c8d; }
        .info-value { font-weight: bold; }
        .status-ok { color: #27ae60; background: #eafaf1; padding: 5px 10px; border-radius: 5px;}
        .status-warn { color: #e67e22; background: #fdf2e9; padding: 5px 10px; border-radius: 5px;}
        .status-danger { color: #c0392b; background: #fdedec; padding: 5px 10px; border-radius: 5px;}
        .loading { text-align: center; font-size: 1.2em; color: #7f8c8d; margin-top: 20px; }
        .currency-badge { background: #34495e; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; margin-left: 6px; }

        /* 折疊規則區塊樣式 */
        .rules-section {
            margin-top: 30px;
            border-top: 2px dashed #dce1e6;
            padding-top: 18px;
        }
        .rules-toggle {
            font-size: 1.2em;
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            background: #ecf0f1;
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            width: 100%;
            text-align: left;
            transition: background 0.2s;
        }
        .rules-toggle:hover {
            background: #d5dbdb;
        }
        .rules-toggle::after {
            content: ' ▶';
            float: right;
        }
        .rules-toggle.active::after {
            content: ' ▼';
        }
        .rules-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #f8f9fa;
            border-radius: 0 0 8px 8px;
        }
        .rules-content.open {
            max-height: 2000px; /* 足夠顯示多筆規則 */
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-top: none;
        }
        .rules-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }
        .rules-table th {
            background: #34495e;
            color: white;
            padding: 8px 12px;
            text-align: left;
        }
        .rules-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #ddd;
        }
        .rules-table tr:last-child td {
            border-bottom: none;
        }
        .rules-table tr:nth-child(even) {
            background: #f1f2f6;
        }
        .no-rules {
            color: #7f8c8d;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 信用卡回饋額度計算機 <span style="font-size:0.5rem; color:#7f8c8d;">(支援台幣/日幣門檻)</span></h1>
        <div id="loading" class="loading">資料載入中，請稍候...</div>
        <div id="results"></div>

        <!-- 回饋規則折疊區塊 -->
        <div class="rules-section">
            <button class="rules-toggle" id="rulesToggle" onclick="toggleRules()">📋 回饋規則一覽</button>
            <div class="rules-content" id="rulesContent">
                <div id="rulesList">載入中...</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        // 你的 Google 試算表 ID
        const sheetId = '11xAUd__Z3COgVmi_8IgCyCelEwkNecPwZdiRSZBrqVg';
        const urlRecords = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=消費紀錄`;
        const urlRules = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=回饋規則`;

        // 儲存規則資料，供渲染規則列表使用
        let cachedRules = [];

        async function fetchData() {
            try {
                const [recordsRes, rulesRes] = await Promise.all([
                    fetch(urlRecords),
                    fetch(urlRules)
                ]);
                
                const recordsCsv = await recordsRes.text();
                const rulesCsv = await rulesRes.text();

                const recordsData = Papa.parse(recordsCsv, { header: true, skipEmptyLines: true }).data;
                const rulesData = Papa.parse(rulesCsv, { header: true, skipEmptyLines: true }).data;

                processData(recordsData, rulesData);
            } catch (error) {
                document.getElementById('loading').innerText = '資料載入失敗，請確認試算表權限是否已設為「知道連結的人皆可檢視」。';
                console.error(error);
            }
        }

        function cleanNumber(str) {
            if (!str) return 0;
            return parseFloat(str.toString().replace(/,/g, '').replace(/[^\d.-]/g, '')) || 0;
        }

        function processData(records, rules) {
            // 整理回饋規則
            const ruleList = rules.map(r => ({
                keyword: r['卡別'] ? r['卡別'].trim() : '',
                rate: r['回饋%'] || '未知',
                min: cleanNumber(r['最低消費']),
                max: cleanNumber(r['最高消費']),
                currency: r['幣別'] ? r['幣別'].trim() : '台幣'
            })).filter(r => r.keyword);

            // 快取規則供折疊區塊使用
            cachedRules = ruleList;

            // 計算消費累積
            const spendingStats = {};
            records.forEach(row => {
                const cardName = row['卡別'] ? row['卡別'].trim() : '';
                const twd = cleanNumber(row['台幣總金額']);
                const jpy = cleanNumber(row['日幣總金額']);
                if (!cardName) return;
                if (!spendingStats[cardName]) {
                    spendingStats[cardName] = { twd: 0, jpy: 0 };
                }
                spendingStats[cardName].twd += twd;
                spendingStats[cardName].jpy += jpy;
            });

            renderResults(spendingStats, ruleList);
            // 渲染折疊區塊的規則列表
            renderRules(ruleList);
        }

        function renderResults(stats, ruleList) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            document.getElementById('loading').style.display = 'none';

            if (Object.keys(stats).length === 0) {
                resultsDiv.innerHTML = '<p style="text-align:center;">目前沒有任何消費紀錄。</p>';
                return;
            }

            for (const [cardName, amounts] of Object.entries(stats)) {
                const twdTotal = amounts.twd;
                const jpyTotal = amounts.jpy;
                const matchedRule = ruleList.find(r => cardName.includes(r.keyword));
                
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card-result';

                let ruleHtml = '';
                let calcHtml = '';

                if (matchedRule) {
                    const min = matchedRule.min;
                    const max = matchedRule.max;
                    const currency = matchedRule.currency;
                    const spent = (currency === '日幣') ? jpyTotal : twdTotal;
                    const currencyLabel = (currency === '日幣') ? '日幣' : '台幣';

                    ruleHtml = `
                        <div class="info-row">
                            <span class="info-label">適用規則：</span>
                            <span class="info-value">${matchedRule.keyword} (${matchedRule.rate}) <span class="currency-badge">${currencyLabel}門檻</span></span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">門檻 / 上限 (${currencyLabel})：</span>
                            <span class="info-value">${min.toLocaleString()} / ${max > 0 ? max.toLocaleString() : '無上限'}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">目前累積 (${currencyLabel})：</span>
                            <span class="info-value" style="font-size:1.2em; color:#2c3e50;">${spent.toLocaleString()}</span>
                        </div>
                    `;

                    if (min > 0 && spent < min) {
                        const needMore = min - spent;
                        calcHtml = `<div class="info-row status-warn"><span class="info-label">狀態：</span><span class="info-value">⏳ 未達低消，還需刷 ${needMore.toLocaleString()} ${currencyLabel}</span></div>`;
                    } else if (max > 0) {
                        if (spent >= max) {
                            calcHtml = `<div class="info-row status-danger"><span class="info-label">狀態：</span><span class="info-value">🛑 已達回饋上限！(超刷 ${(spent - max).toLocaleString()} ${currencyLabel})</span></div>`;
                        } else {
                            const remain = max - spent;
                            calcHtml = `<div class="info-row status-ok"><span class="info-label">狀態：</span><span class="info-value">✅ 達標！額度還有 ${remain.toLocaleString()} ${currencyLabel}</span></div>`;
                        }
                    } else {
                        calcHtml = `<div class="info-row status-ok"><span class="info-label">狀態：</span><span class="info-value">✅ 無上限，請安心使用！</span></div>`;
                    }
                } else {
                    ruleHtml = `<div class="info-row status-danger" style="margin-top:10px;"><span class="info-value">找不到對應的回饋規則，請檢查「回饋規則」分頁是否設定此關鍵字。</span></div>`;
                }

                cardDiv.innerHTML = `
                    <div class="card-title">${cardName}</div>
                    <div class="info-row">
                        <span class="info-label">台幣累積：</span>
                        <span class="info-value">${twdTotal.toLocaleString()} 元</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">日幣累積：</span>
                        <span class="info-value">${jpyTotal.toLocaleString()} 円</span>
                    </div>
                    ${ruleHtml}
                    ${calcHtml}
                `;

                resultsDiv.appendChild(cardDiv);
            }
        }

        // 渲染折疊區塊的規則表格
        function renderRules(ruleList) {
            const container = document.getElementById('rulesList');
            if (!ruleList || ruleList.length === 0) {
                container.innerHTML = '<div class="no-rules">尚未設定任何回饋規則。</div>';
                return;
            }

            let html = `
                <table class="rules-table">
                    <thead>
                        <tr>
                            <th>卡別關鍵字</th>
                            <th>回饋%</th>
                            <th>最低消費</th>
                            <th>最高消費</th>
                            <th>幣別</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            ruleList.forEach(r => {
                const minStr = r.min > 0 ? r.min.toLocaleString() : '—';
                const maxStr = r.max > 0 ? r.max.toLocaleString() : '無上限';
                html += `
                    <tr>
                        <td><strong>${r.keyword}</strong></td>
                        <td>${r.rate}</td>
                        <td>${minStr}</td>
                        <td>${maxStr}</td>
                        <td>${r.currency}</td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 折疊展開切換
        function toggleRules() {
            const content = document.getElementById('rulesContent');
            const btn = document.getElementById('rulesToggle');
            content.classList.toggle('open');
            btn.classList.toggle('active');
        }

        // 頁面載入執行
        fetchData();
    </script>
</body>
</html>
